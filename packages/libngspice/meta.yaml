package:
  name: libngspice
  version: "44.2"
  tag:
    - library
    - shared_library
source:
  url: https://github.com/danchitnis/ngspice-sf-mirror/archive/refs/tags/ngspice-44.2.zip
  sha256: 3ae94703938247a22148f60a1307d52719d42a9134b5aef6252594000f513902
  patches:
    - patches/0001-keep-alive-API-functions.patch
    - patches/0001-no-hicum2.patch

build:
  type: shared_library
  script: |
    bash ./autogen.sh

    configure_args=(
      --prefix=${WASM_LIBRARY_DIR}
      --enable-xspice
      --disable-debug
      --disable-dependency-tracking
      --enable-cider
      --with-readline=no
      --disable-openmp
      --with-ngshared
      --build=x86_64-pc-linux-gnu
      --host=wasm32-unknown-emscripten
    )

    mkdir release-lib && cd release-lib
    emconfigure ../configure "${configure_args[@]}" \
      CFLAGS="${SIDE_MODULE_CFLAGS}" \
      CC_FOR_BUILD="gcc" \
      CFLAGS_FOR_BUILD="-O2" \
      LDFLAGS_FOR_BUILD=""

    # Fix libtool to enable shared library building with Emscripten
    sed -i 's/^build_libtool_libs=no$/build_libtool_libs=yes/g' libtool

    emmake make -j ${PYODIDE_JOBS:-3} LDFLAGS="${SIDE_MODULE_LDFLAGS}"
    emmake make install
    cp ${WASM_LIBRARY_DIR}/lib/libngspice.so ${DISTDIR}

about:
  home: http://ngspice.sourceforge.net
  license: BSD-3-Clause
  summary: The open source spice simulator for electric and electronic circuits
extra:
  recipe-maintainers:
    - pepijndevos
